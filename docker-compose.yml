version: '3.8'

services:
  nestjs-app:
    env_file:
      - ./.env
    build:
      context: ${APP_CONTEXT}
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-nestjs-app}
    # Host networking is required for Wake-on-LAN: the magic packet is an L2
    # broadcast and a bridged container cannot reach the physical LAN. With host
    # mode the app shares the host's interfaces, so it binds APP_PORT directly on
    # the host (the `ports:` mapping is intentionally dropped) and reaches the DB
    # and RabbitMQ via localhost (they still publish their ports on the host).
    # NOTE: host networking only works on a Linux Docker host (not Docker Desktop
    # on Windows/macOS).
    network_mode: host
    environment:
      # Under host networking there is no port mapping — the app binds this port
      # directly on the host (keep it equal to your previous published port).
      PORT: ${APP_PORT:-3000}
      # No Compose DNS in host mode: reach DB/MQ via the host-published ports.
      DATABASE_URL: 'postgresql://${DB_USER}:${DB_PASSWORD}@localhost:${DB_PORT}/${DB_NAME}'
      RABBITMQ_URL: 'amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@localhost:${RABBITMQ_PORT}'
      INTERFACE_URL: ${APP_URL}

      SUPERUSER_FIRSTNAME: ${SUPERUSER_FIRSTNAME}
      SUPERUSER_LASTNAME: ${SUPERUSER_LASTNAME}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_RESET_PASSWORD_SECRET: ${JWT_RESET_PASSWORD_SECRET}
      JWT_REGISTER_SECRET: ${JWT_REGISTER_SECRET}

      MAIN_QUEUE: ${MAIN_QUEUE}
      MULTIVERSE_QUEUE: ${MULTIVERSE_QUEUE}

      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
    volumes:
      - ${APP_DATA}:/app/public
    depends_on:
      - postgresql
      - rabbitmq
    restart: always

  postgresql:
    env_file:
      - ./.env
    image: postgres:15-alpine
    container_name: ${DB_CONTAINER_NAME:-postgresql}
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-admin_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_password}
      POSTGRES_DB: ${DB_NAME:-admin_db}
    volumes:
      - ${POSTGRES_DATA_PATH:-/mnt/VAULT/APPS/panel/data}:/var/lib/postgresql/data
    restart: always

  rabbitmq:
    env_file:
      - ./.env
    image: rabbitmq:3-management-alpine
    container_name: ${RABBITMQ_CONTAINER_NAME:-rabbitmq}
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

volumes:
  pg_data:
    driver: local
  rabbitmq_data:
    driver: local
