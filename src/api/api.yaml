        - name
    OcrStructuredTotalsDto:
      type: object
      properties:
        subtotal:
          type: number
          description: Subtotal amount before taxes (if present)
          example: 32.37
        vatTotal:
          type: number
          description: Total VAT amount (if present)
          example: 1.78
        total:
          type: number
          description: Grand total amount
          example: 34.15
        currency:
          type: string
          description: Currency code inferred from the document
          example: PLN
    OcrStructuredResponseDto:
      type: object
      properties:
        cleanedText:
          type: string
          description: Cleaned, human-readable text reconstructed from OCR
          example: |-
            ZETO Serwis
            ul. Oleska 7
            45-052 Opole
            NIP: 7453009977
            ...
        header:
          description: Document header fields
          allOf:
            - $ref: '#/components/schemas/OcrStructuredHeaderDto'
        items:
          description: Detected line items
          example:
            - name: Ser żółty
              quantity: 0.5
              unit: kg
              unitPrice: 11.9
              lineTotal: 5.95
              vatRate: 8
              currency: PLN
            - name: Jabłka
              quantity: 3
              unitPrice: 4.4
              lineTotal: 13.2
              currency: PLN
          type: array
          items:
            $ref: '#/components/schemas/OcrStructuredItemDto'
        totals:
          description: Totals section
          example:
            subtotal: 32.37
            vatTotal: 1.78
            total: 34.15
            currency: PLN
          allOf:
            - $ref: '#/components/schemas/OcrStructuredTotalsDto'
        warnings:
          description: Non-fatal warnings the model produced while structuring
          example:
            - Uncertain currency
            - Ambiguous date format
          type: array
          items:
            type: string
      required:
        - cleanedText
        - header
        - items
        - totals
