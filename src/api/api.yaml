info:
  title: WHCP Backend
  description: XD
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT
      description: Enter JWT token
      in: header
    JWT-refresh:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT refresh
      description: Enter JWT refresh token
      in: header
    JWT-reset-password:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT reset password
      description: Enter JWT reset password token
      in: header
    JWT-register-user:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT register user
      description: Enter JWT register user
      in: header
  schemas:
    PersonRelation:
      type: string
      enum:
        - FAMILY
        - FRIEND
        - WORK
        - OTHER
    AiContextResponseDto:
      type: object
      properties:
        id:
          type: string
        summary:
          type: string
        keywords:
          type: object
        context:
          type: string
        aiMeta:
          type: object
        aiConfidence:
          type: number
        aiSource:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
    PersonDetailResponseDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        notes:
          type: string
        birthday:
          type: string
          format: date-time
        avatarUrl:
          type: string
        relation:
          $ref: '#/components/schemas/PersonRelation'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        aiContext:
          $ref: '#/components/schemas/AiContextResponseDto'
      required:
        - id
        - name
        - createdAt
        - updatedAt
    PaginationDto:
      type: object
      properties:
        take:
          type: number
          minimum: 1
          maximum: 20
        skip:
          type: number
          minimum: 0
          default: 0
    PersonListResponseDto:
      type: object
      properties:
        persons:
          type: array
          items:
            $ref: '#/components/schemas/PersonDetailResponseDto'
        total:
          type: number
        params:
          $ref: '#/components/schemas/PaginationDto'
      required:
        - persons
        - total
    AiHistoryResponseDto:
      type: object
      properties:
        id:
          type: string
        aiContextId:
          type: string
        timestamp:
          type: string
          format: date-time
        action:
          type: string
        source:
          type: string
        userPrompt:
          type: string
        aiResponse:
          type: string
        text:
          type: string
        meta:
          type: object
      required:
        - id
        - aiContextId
        - timestamp
        - action
    AiHistoryListResponseDto:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AiHistoryResponseDto'
        total:
          type: number
      required:
        - entries
        - total
    PersonCreateDto:
      type: object
      properties:
        name:
          type: string
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        notes:
          type: string
        birthday:
          type: string
          format: date-time
        avatarUrl:
          type: string
        relation:
          $ref: '#/components/schemas/PersonRelation'
        locationId:
          type: string
          description: Location ID to associate with this person
      required:
        - name
    PersonUpdateDto:
      type: object
      properties:
        name:
          type: string
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        notes:
          type: string
        birthday:
          type: string
          format: date-time
        avatarUrl:
          type: string
        relation:
          $ref: '#/components/schemas/PersonRelation'
        locationId:
          type: string
          description: Location ID to associate with this person
    SignInDto:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    TokensDto:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      required:
        - access_token
        - refresh_token
    RequestResetPasswordDto:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    ResetPasswordDto:
      type: object
      properties:
        newPassword:
          type: string
        deleteSessions:
          type: boolean
      required:
        - newPassword
        - deleteSessions
    RegisterDto:
      type: object
      properties:
        password:
          type: string
      required:
        - password
    Role:
      type: string
      enum:
        - USER
        - MODERATOR
        - ADMIN
        - OWNER
    UserDto:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
      required:
        - email
        - role
    UserResponseDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - role
        - createdAt
    UserListResponseDto:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserResponseDto'
        total:
          type: number
        params:
          $ref: '#/components/schemas/PaginationDto'
      required:
        - users
        - total
    UserSettingsResponseDto:
      type: object
      properties:
        id:
          type: string
        serverStatusEmailNotifications:
          type: boolean
        serverIdleEmailNotifications:
          type: boolean
        serverPushNotifications:
          type: boolean
        processEmailNotifications:
          type: boolean
        processPushNotifications:
          type: boolean
      required:
        - id
        - serverStatusEmailNotifications
        - serverIdleEmailNotifications
        - serverPushNotifications
        - processEmailNotifications
        - processPushNotifications
    PatchUserSettingsDto:
      type: object
      properties:
        serverStatusEmailNotifications:
          type: boolean
        serverIdleEmailNotifications:
          type: boolean
        serverPushNotifications:
          type: boolean
        processEmailNotifications:
          type: boolean
        processPushNotifications:
          type: boolean
    PatchUserAdminDto:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
    ImageProcessingSummaryResponse:
      type: object
      properties:
        total:
          type: integer
        done:
          type: integer
        pending:
          type: integer
        processing:
          type: integer
        failed:
          type: integer
      required:
        - total
        - done
        - pending
        - processing
        - failed
    ReprocessTargetMode:
      type: string
      enum:
        - missing
        - all
    ReprocessDto:
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/ReprocessTargetMode'
    ReprocessStartedResponse:
      type: object
      properties:
        started:
          type: boolean
        total:
          type: integer
      required:
        - started
        - total
    FileDto:
      type: object
      properties:
        id:
          type: string
      required:
        - id
    UploadResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Uploaded image ID
        coverUrl:
          type: string
          description: URL to the cover image
        lowResUrl:
