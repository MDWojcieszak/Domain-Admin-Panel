components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT
      description: Enter JWT token
      in: header
    JWT-refresh:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT refresh
      description: Enter JWT refresh token
      in: header
    JWT-reset-password:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT reset password
      description: Enter JWT reset password token
      in: header
    JWT-register-user:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: JWT register user
      description: Enter JWT register user
      in: header
  schemas:
    PersonRelation:
      type: string
      enum:
        - FAMILY
        - FRIEND
        - WORK
        - OTHER
    AiContextResponseDto:
      type: object
      properties:
        id:
          type: string
        summary:
          type: string
        keywords:
          type: object
        context:
          type: string
        aiMeta:
          type: object
        aiConfidence:
          type: number
        aiSource:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
    PersonDetailResponseDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        notes:
          type: string
        birthday:
          type: string
          format: date-time
        avatarUrl:
          type: string
        relation:
          $ref: '#/components/schemas/PersonRelation'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        aiContext:
          $ref: '#/components/schemas/AiContextResponseDto'
      required:
        - id
        - name
        - createdAt
        - updatedAt
    PaginationDto:
      type: object
      properties:
        take:
          type: number
          minimum: 1
          maximum: 20
        skip:
          type: number
          minimum: 0
          default: 0
